<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Prompt Builder</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

*{font-family:'DM Sans',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}

body{
background:#000;
color:white;
min-height:100vh;
}

.gradient{
background:radial-gradient(circle at 20% 20%, rgba(249,115,22,0.15), transparent),
radial-gradient(circle at 80% 80%, rgba(192,38,211,0.15), transparent);
}

.glass{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
}

input{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
}

textarea{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
}

button.primary{
background:linear-gradient(135deg,#f97316,#c026d3);
}

</style>

</head>

<body class="gradient">

<div class="max-w-4xl mx-auto px-6 py-12">

<a href="../index.html" class="text-white/60 hover:text-white text-sm">
← Back to Homepage
</a>

<h1 class="text-4xl font-bold mt-6 mb-2 bg-gradient-to-r from-orange-400 to-fuchsia-400 bg-clip-text text-transparent">
Marketing Prompt Builder
</h1>

<p class="text-white/60 mb-8">
Build structured prompts for marketing strategies and campaigns.
</p>

<div class="glass rounded-2xl p-6 space-y-4">

<div>
<label class="text-sm text-white/70">Product / Service</label>
<input id="product" class="w-full p-3 rounded-xl mt-1" placeholder="Example: Organic skincare brand">
</div>

<div>
<label class="text-sm text-white/70">Target Audience</label>
<input id="audience" class="w-full p-3 rounded-xl mt-1" placeholder="Example: Women with melanin-rich skin">
</div>

<div>
<label class="text-sm text-white/70">Marketing Goal</label>
<input id="goal" class="w-full p-3 rounded-xl mt-1" placeholder="Example: Instagram marketing campaign">
</div>

<button id="buildBtn" class="primary w-full py-4 rounded-xl font-semibold mt-4">
Build Marketing Prompt
</button>

</div>

<div id="resultSection" class="hidden glass rounded-2xl p-6 mt-6">

<div class="flex justify-between items-center mb-4">

<h2 class="font-bold text-lg text-orange-300">
Marketing Prompt
</h2>

<button id="copyBtn"
class="text-sm px-4 py-2 rounded-lg border border-white/10">
Copy
</button>

</div>

<div id="result" class="mono text-sm leading-7 whitespace-pre-wrap"></div>

<div class="grid grid-cols-2 gap-3 mt-6">

<button id="editBtn"
class="border border-white/10 py-3 rounded-xl">
Edit
</button>

<button id="restartBtn"
class="primary py-3 rounded-xl font-semibold">
Start Over
</button>

</div>

</div>

</div>

<script>

const product=document.getElementById("product")
const audience=document.getElementById("audience")
const goal=document.getElementById("goal")

const buildBtn=document.getElementById("buildBtn")

const result=document.getElementById("result")
const resultSection=document.getElementById("resultSection")

const copyBtn=document.getElementById("copyBtn")
const restartBtn=document.getElementById("restartBtn")
const editBtn=document.getElementById("editBtn")

function buildPrompt(){

return `Act as an expert digital marketing strategist.

Create a marketing strategy for the following:

Product or Service:
${product.value}

Target Audience:
${audience.value}

Marketing Goal:
${goal.value}

Provide:

- campaign ideas
- messaging strategies
- content ideas
- platform strategies
- growth tactics

Make the strategy actionable and practical.`

}

buildBtn.onclick=()=>{

if(!product.value || !audience.value || !goal.value){
alert("Fill in all fields")
return
}

result.textContent=buildPrompt()

resultSection.classList.remove("hidden")

}

copyBtn.onclick=()=>{

navigator.clipboard.writeText(result.textContent)

alert("Copied!")

}

restartBtn.onclick=()=>{

product.value=""
audience.value=""
goal.value=""
resultSection.classList.add("hidden")

}

editBtn.onclick=()=>{

window.scrollTo({top:0,behavior:"smooth"})

}

</script>

</body>
</html>
