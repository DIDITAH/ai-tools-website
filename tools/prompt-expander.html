<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt Expander</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#000;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.gradient{
background:radial-gradient(circle at 30% 20%, rgba(249,115,22,0.15), transparent),
radial-gradient(circle at 70% 80%, rgba(192,38,211,0.15), transparent);
}

.glass{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
}

textarea{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
}

button.primary{
background:linear-gradient(135deg,#f97316,#c026d3);
}

.mono{
font-family:'JetBrains Mono',monospace;
}

</style>

</head>

<body class="gradient">

<div class="max-w-4xl mx-auto px-6 py-12">

<a href="../index.html" class="text-white/60 text-sm hover:text-white">
← Back to Homepage
</a>

<h1 class="text-4xl font-bold mt-6 mb-2 bg-gradient-to-r from-orange-400 to-fuchsia-400 bg-clip-text text-transparent">
Prompt Expander
</h1>

<p class="text-white/60 mb-8">
Turn a short idea into a richer, more detailed prompt.
</p>

<div class="glass rounded-2xl p-6">

<label class="block mb-2 text-sm text-white/70">
Short Prompt
</label>

<textarea id="input"
class="w-full h-40 rounded-xl p-4 mono text-sm"
placeholder="Example: marketing for skincare brand"></textarea>

<button id="expandBtn"
class="primary w-full py-4 rounded-xl mt-6 font-semibold">
Expand Prompt
</button>

</div>

<div id="resultSection"
class="hidden glass rounded-2xl p-6 mt-6">

<div class="flex justify-between items-center mb-4">

<h2 class="font-bold text-lg text-orange-300">
Expanded Prompt
</h2>

<button id="copyBtn"
class="text-sm px-4 py-2 rounded-lg border border-white/10">
Copy
</button>

</div>

<div id="result"
class="mono text-sm leading-7 whitespace-pre-wrap"></div>

<div class="grid grid-cols-2 gap-3 mt-6">

<button id="editBtn"
class="border border-white/10 py-3 rounded-xl">
Edit
</button>

<button id="restartBtn"
class="primary py-3 rounded-xl font-semibold">
Start Over
</button>

</div>

</div>

</div>

<script>

const input=document.getElementById("input")
const expandBtn=document.getElementById("expandBtn")
const result=document.getElementById("result")
const resultSection=document.getElementById("resultSection")
const copyBtn=document.getElementById("copyBtn")
const restartBtn=document.getElementById("restartBtn")
const editBtn=document.getElementById("editBtn")

function expandPrompt(text){

return `Act as an expert professional in the relevant field.

Your task is to help with the following request:

${text}

Provide a clear, structured, and detailed response.

Include:
- practical strategies
- useful examples
- step-by-step suggestions when possible
- insights that would improve the quality of the result.

Make the response actionable and easy to apply.`

}

expandBtn.onclick=()=>{

const value=input.value.trim()

if(!value){
alert("Enter a prompt first")
return
}

const expanded=expandPrompt(value)

result.textContent=expanded

resultSection.classList.remove("hidden")

}

copyBtn.onclick=()=>{

navigator.clipboard.writeText(result.textContent)

alert("Copied!")

}

restartBtn.onclick=()=>{

input.value=""
resultSection.classList.add("hidden")

}

editBtn.onclick=()=>{

window.scrollTo({top:0,behavior:"smooth"})
input.focus()

}

</script>

</body>
</html>
