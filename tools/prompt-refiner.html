<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Refiner</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#000;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
}

textarea{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.15);
}

button{
background:linear-gradient(135deg,#f97316,#c026d3);
}

</style>
</head>

<body>

<div class="max-w-2xl w-full card rounded-2xl p-8">

<h1 class="text-3xl font-bold mb-4 text-center">
Prompt Refiner
</h1>

<p class="text-white/70 mb-6 text-center">
Turn messy ideas into cleaner, stronger prompts.
</p>

<textarea id="input"
class="w-full p-4 rounded-xl h-40 mb-4"
placeholder="Type your rough idea or messy prompt here..."></textarea>

<button onclick="refinePrompt()"
class="w-full py-4 rounded-xl font-semibold">
Refine Prompt
</button>

<div id="output"
class="mt-6 p-4 rounded-xl bg-orange-500/10 border border-orange-400/30 hidden">
</div>

</div>

<script>

function refinePrompt(){

let text=document.getElementById("input").value.trim()

if(text===""){
alert("Please enter something first.")
return
}

let cleaned=text
.replace(/\b(um|uh|like|basically|actually|just|really|very)\b/gi,"")
.replace(/\s+/g," ")
.trim()

cleaned=cleaned.charAt(0).toUpperCase()+cleaned.slice(1)

if(!/[.!?]$/.test(cleaned)){
cleaned+="."
}

cleaned+=" Please provide a clear and detailed response."

let output=document.getElementById("output")

output.innerText=cleaned
output.classList.remove("hidden")

}

</script>

</body>
</html>
